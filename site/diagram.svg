<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="-apple-system, 'Pretendard', 'SF Pro', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0e0e0e" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e0e0e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="760" fill="#fbfaf6"/>

  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#0e0e0e" letter-spacing="-0.5">
    위클렌드 파이프라인
  </text>
  <text x="450" y="76" text-anchor="middle" font-size="13" fill="#6b6860">
    에이전트 5명이 매주 월요일 자동으로 굴린다
  </text>

  <!-- Stage label: 수집 -->
  <text x="60" y="140" font-size="11" font-weight="600" fill="#d97757" letter-spacing="2">STAGE 1 · 수집</text>

  <!-- github-scout -->
  <g filter="url(#shadow)">
    <rect x="120" y="160" width="280" height="90" rx="16" fill="#ffeca0" stroke="#0e0e0e" stroke-width="1.5"/>
  </g>
  <text x="145" y="195" font-size="22">🔍</text>
  <text x="180" y="195" font-size="16" font-weight="700" fill="#0e0e0e">github-scout</text>
  <text x="145" y="222" font-size="12" fill="#2b2b2b">GitHub 트렌딩 · .claude/agents 경로</text>
  <text x="145" y="240" font-size="12" fill="#2b2b2b">· awesome-list · star velocity</text>

  <!-- community-scout -->
  <g filter="url(#shadow)">
    <rect x="500" y="160" width="280" height="90" rx="16" fill="#ffeca0" stroke="#0e0e0e" stroke-width="1.5"/>
  </g>
  <text x="525" y="195" font-size="22">📡</text>
  <text x="560" y="195" font-size="16" font-weight="700" fill="#0e0e0e">community-scout</text>
  <text x="525" y="222" font-size="12" fill="#2b2b2b">HN · Reddit · dev.to</text>
  <text x="525" y="240" font-size="12" fill="#2b2b2b">· GeekNews · velog · X</text>

  <!-- Arrows to analyzer -->
  <path d="M 260 250 L 260 295 Q 260 310 275 310 L 425 310 Q 440 310 440 325 L 440 345" stroke="#0e0e0e" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <path d="M 640 250 L 640 295 Q 640 310 625 310 L 475 310 Q 460 310 460 325 L 460 345" stroke="#0e0e0e" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>

  <!-- Stage label: 분석 -->
  <text x="60" y="370" font-size="11" font-weight="600" fill="#d97757" letter-spacing="2">STAGE 2 · 분석</text>

  <!-- trend-analyzer -->
  <g filter="url(#shadow)">
    <rect x="250" y="385" width="400" height="90" rx="16" fill="#d8edd0" stroke="#0e0e0e" stroke-width="1.5"/>
  </g>
  <text x="275" y="420" font-size="22">🧮</text>
  <text x="310" y="420" font-size="16" font-weight="700" fill="#0e0e0e">trend-analyzer</text>
  <text x="275" y="447" font-size="12" fill="#2b2b2b">Rising vs Classic 분류 · 4축 가중 점수</text>
  <text x="275" y="465" font-size="12" fill="#2b2b2b">(velocity · buzz · quality · recency)</text>

  <!-- Arrow to curator -->
  <path d="M 450 475 L 450 520" stroke="#0e0e0e" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>

  <!-- Stage label: 큐레이션 -->
  <text x="60" y="545" font-size="11" font-weight="600" fill="#d97757" letter-spacing="2">STAGE 3 · 큐레이션</text>

  <!-- content-curator -->
  <g filter="url(#shadow)">
    <rect x="250" y="560" width="400" height="90" rx="16" fill="#ffd8bd" stroke="#0e0e0e" stroke-width="1.5"/>
  </g>
  <text x="275" y="595" font-size="22">✍️</text>
  <text x="310" y="595" font-size="16" font-weight="700" fill="#0e0e0e">content-curator</text>
  <text x="275" y="622" font-size="12" fill="#2b2b2b">한글 요약 3줄 · 핵심 기능 · 태그</text>
  <text x="275" y="640" font-size="12" fill="#2b2b2b">· 설치 힌트 · "이럴 때 쓴다"</text>

  <!-- Arrow to builder -->
  <path d="M 450 650 L 450 690" stroke="#0e0e0e" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>

  <!-- site-builder (bottom pill) -->
  <g filter="url(#shadow)">
    <rect x="280" y="700" width="340" height="48" rx="24" fill="#0e0e0e"/>
  </g>
  <text x="310" y="730" font-size="16">🚀</text>
  <text x="340" y="731" font-size="14" font-weight="700" fill="#ffffff">site-builder</text>
  <text x="440" y="731" font-size="12" fill="#b3afa4">→ inno-hi.github.io/weeklaude</text>
</svg>
